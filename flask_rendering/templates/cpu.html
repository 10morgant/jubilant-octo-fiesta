<!DOCTYPE html>
<html>

<head>
  <title>VM CPU Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #0f1117;
      color: #eee;
      padding: 1rem 1.5rem;
      margin: 0;
    }

    h2 { margin: 0 0 0.25rem; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .range-select {
      background: #161b22;
      color: #eee;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }

    .range-select:focus { border-color: #a78bfa; }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .chart-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.85rem 1.25rem 0.75rem;
    }

    .chart-canvas-wrap {
      position: relative;
      height: 220px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .chart-header h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .toggles {
      display: flex;
      gap: 0.5rem;
    }

    .toggle-btn {
      border: 2px solid var(--c);
      background: var(--c);
      color: #111;
      padding: 3px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: background 0.15s, opacity 0.15s;
      user-select: none;
    }

    .toggle-btn.hidden {
      background: transparent;
      color: var(--c);
      opacity: 0.45;
    }

    canvas { width: 100% !important; height: 100% !important; }
  </style>
</head>

<body>
  <h2>CPU — live</h2>
  <div class="toolbar">
    <select id="range-select" class="range-select">
      {% for r in ranges %}
      <option value="{{ r }}" {% if r == default_range %}selected{% endif %}>
        {%- if r == "-5m" %}Last 5 min
        {%- elif r == "-15m" %}Last 15 min
        {%- elif r == "-30m" %}Last 30 min
        {%- elif r == "-1h" %}Last 1 hour
        {%- elif r == "-3h" %}Last 3 hours
        {%- elif r == "-6h" %}Last 6 hours
        {%- elif r == "-12h" %}Last 12 hours
        {%- else %}{{ r }}{%- endif %}
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="charts-grid">
    {% for m in metrics %}
    <div class="chart-card">
      <div class="chart-header">
        <h3>{{ m.label }}</h3>
        <div class="toggles">
          {% for s in m.series %}
          <button
            class="toggle-btn"
            style="--c: {{ s.colour }}"
            data-metric="{{ m.id }}"
            data-idx="{{ loop.index0 }}"
          >{{ s.label }}</button>
          {% endfor %}
        </div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="canvas-{{ m.id }}"></canvas>
      </div>
    </div>
    {% endfor %}
  </div>

  <script>
    // Metrics injected from server
    const METRICS = {{ metrics | tojson }};

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    const SCALE_OPTS = {
      x: {
        type: "time",
        time: { unit: "minute" },
        ticks: { color: "#888", maxTicksLimit: 6 },
        grid: { color: "#1e2530" },
      },
      y: {
        min: 0,
        ticks: { color: "#888" },
        grid: { color: "#1e2530" },
      },
    };

    // Build one Chart per metric
    const charts = {};
    METRICS.forEach(m => {
      const ctx = document.getElementById(`canvas-${m.id}`).getContext("2d");
      charts[m.id] = new Chart(ctx, {
        type: "line",
        data: {
          datasets: m.series.map(s => ({
            label: s.label,
            data: [],
            borderColor: s.colour,
            backgroundColor: hexToRgba(s.colour, 0.07),
            borderWidth: 1.5,
            tension: 0,
            pointRadius: 0,
            fill: s.agg === "avg",   // shade only the avg line
          })),
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          scales: SCALE_OPTS,
          plugins: {
            legend: { display: false },   // replaced by custom toggle buttons
            tooltip: {
              mode: "index",
              intersect: false,
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1) ?? "—"}%`,
              },
            },
          },
        },
      });
    });

    // Toggle button logic
    document.querySelectorAll(".toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const chart  = charts[btn.dataset.metric];
        const idx    = parseInt(btn.dataset.idx, 10);
        const nowVisible = chart.isDatasetVisible(idx);
        chart.setDatasetVisibility(idx, !nowVisible);
        btn.classList.toggle("hidden", nowVisible);
        chart.update();
      });
    });

    // SSE — reconnects when range changes
    let evtSource = null;

    function connect(range) {
      if (evtSource) evtSource.close();
      evtSource = new EventSource(`/stream?range=${encodeURIComponent(range)}`);  

      evtSource.onopen = () => {};

      evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        METRICS.forEach(m => {
          const chart = charts[m.id];
          m.series.forEach((s, i) => {
            chart.data.datasets[i].data = (data[m.id]?.[s.agg] ?? []).map(p => ({
              x: new Date(p.time),
              y: p.value,
            }));
          });
          chart.update();
        });
      };

      evtSource.onerror = () => {};
    }

    document.getElementById("range-select").addEventListener("change", (e) => {
      connect(e.target.value);
    });

    connect(document.getElementById("range-select").value);
  </script>
</body>

</html>
