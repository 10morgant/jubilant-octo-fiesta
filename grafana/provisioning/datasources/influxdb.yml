apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: vm_perf
      defaultBucket: vm_perf
      tlsSkipVerify: true
    secureJsonData:
      token: vm-perf-admin-token
    isDefault: true
    editable: true
